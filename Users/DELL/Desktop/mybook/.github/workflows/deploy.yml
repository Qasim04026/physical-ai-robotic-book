name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Adjust this if your default branch is different

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18 # Or a suitable Node.js version for Docusaurus
          cache: npm
      - name: Install dependencies
        run: cd book && npm install
      - name: Build Docusaurus website
        run: cd book && npm run build
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./book/build # Docusaurus default build output directory, adjusted for book/ subdirectory
